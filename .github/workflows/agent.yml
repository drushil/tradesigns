name: Trading Agent - Signal Cycle

on:
  schedule:
    # Every 5 minutes Mon-Fri 14:00-21:00 UTC (9am-4pm EST)
    - cron: '*/5 14-20 * * 1-5'
    # Weekly digest: Sunday 18:00 UTC
    - cron: '0 18 * * 0'
    # Off-hours macro/dip alert scan (no trading)
    - cron: '0 */4 * * *'
  workflow_dispatch:   # allow manual run from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-agent-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Validate runtime configuration
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
        run: |
          python <<'PY'
          import os
          import sys

          required = [
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "GROQ_API_KEY",
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_KEY",
          ]
          missing = [key for key in required if not os.getenv(key)]
          for key in required:
              print(f"{key}: {'set' if os.getenv(key) else 'missing'}")
          if missing:
              print(f"Missing required configuration: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run signal cycle
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          ALPACA_BASE_URL:      https://paper-api.alpaca.markets
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          NEWSAPI_KEY:          "${{ secrets.NEWSAPI_KEY }}"
          REDDIT_CLIENT_ID:     "${{ secrets.REDDIT_CLIENT_ID }}"
          REDDIT_CLIENT_SECRET: "${{ secrets.REDDIT_CLIENT_SECRET }}"
          REDDIT_USER_AGENT:    "${{ secrets.REDDIT_USER_AGENT }}"
          DISCORD_WEBHOOK_URL:  "${{ secrets.DISCORD_WEBHOOK_URL }}"
          TELEGRAM_BOT_TOKEN:   "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID:     "${{ secrets.TELEGRAM_CHAT_ID }}"
          RISK_PROFILE:         "${{ vars.RISK_PROFILE }}"
          INVESTMENT_HORIZON:   "${{ vars.INVESTMENT_HORIZON }}"
          TICKER_UNIVERSE:      "${{ vars.TICKER_UNIVERSE }}"
          SWING_TICKERS:        "${{ vars.SWING_TICKERS }}"
          STARTING_CAPITAL_EUR: "${{ vars.STARTING_CAPITAL_EUR }}"
          LLM_CALLS_PER_HOUR_LIMIT: "20"
        run: |
          python <<'PY'
          from datetime import datetime, timezone
          from backend.agent import run_signal_cycle, run_weekly_digest

          now = datetime.now(timezone.utc)
          if now.weekday() == 6 and now.hour == 18:
              print("Running weekly digest...")
              run_weekly_digest()
          elif now.weekday() < 5 and 14 <= now.hour <= 20:
              print("Running signal cycle...")
              run_signal_cycle()
          else:
              print("Outside trading window; Telegram step will run dip-alert scan only.")
          PY

      - name: Send Discord summary
        if: always()
        env:
          PYTHONPATH: "."
          DISCORD_WEBHOOK_URL: "${{ secrets.DISCORD_WEBHOOK_URL }}"
        run: |
          python scripts/discord_notify.py

      - name: Send Telegram summary
        if: always()
        env:
          PYTHONPATH: "."
          TELEGRAM_BOT_TOKEN:   "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID:     "${{ secrets.TELEGRAM_CHAT_ID }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          TICKER_UNIVERSE:      "${{ vars.TICKER_UNIVERSE }}"
          TELEGRAM_SCAN_DIPS:   "true"
        run: |
          python scripts/telegram_notify.py

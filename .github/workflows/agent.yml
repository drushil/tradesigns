name: Advisory Agent - Nightly & Scheduled Jobs

on:
  schedule:
    # Weekly portfolio review: Sunday 17:00 UTC (observation only, no trades)
    - cron: '0 17 * * 0'
    # Weekly digest: Sunday 18:00 UTC
    - cron: '0 18 * * 0'
    # Off-hours macro/advisory alert scan (weekdays only; no weekend noise)
    - cron: '0 */4 * * 1-5'
    # Nightly analytics + advisory learner — after US market close Mon-Fri (21:05 UTC)
    - cron: '5 21 * * 1-5'
    # Daily EOD review — after replay analytics (read-only recommendations)
    - cron: '25 21 * * 1-5'
  # Manual override: workflow_dispatch with optional mode input
  workflow_dispatch:
    inputs:
      mode:
        description: 'Override agent mode (leave blank for auto-detect by time). Options: portfolio_review | digest | sweep | analytics | eod_review | advisory'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: advisory-agent-scheduled
  cancel-in-progress: true

jobs:
  run-agent-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        run: |
          for attempt in 1 2 3; do
            echo "Checkout attempt $attempt..."
            curl -fsSL "https://api.github.com/repos/drushil/tradesigns/tarball/main" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -o repo.tar.gz && \
            file repo.tar.gz | grep -q "gzip" && \
            tar -xzf repo.tar.gz --strip-components=1 && \
            rm repo.tar.gz && \
            echo "Checkout succeeded on attempt $attempt" && break
            echo "Attempt $attempt failed, retrying in 15s..."
            rm -f repo.tar.gz
            sleep 15
          done
          [ -f requirements-agent.txt ] || { echo "Checkout failed after 3 attempts"; exit 1; }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Validate runtime configuration
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
        run: |
          python <<'PY'
          import os
          import sys

          required = [
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "GROQ_API_KEY",
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_KEY",
          ]
          missing = [key for key in required if not os.getenv(key)]
          for key in required:
              print(f"{key}: {'set' if os.getenv(key) else 'missing'}")
          if missing:
              print(f"Missing required configuration: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run advisory agent
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          ALPACA_BASE_URL:      https://paper-api.alpaca.markets
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          GROQ_DECISION_MODEL:  "${{ vars.GROQ_DECISION_MODEL }}"
          GROQ_SHADOW_DECISION_MODEL: "${{ vars.GROQ_SHADOW_DECISION_MODEL }}"
          GROQ_DIGEST_MODEL:    "${{ vars.GROQ_DIGEST_MODEL }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          NEWSAPI_KEY:          "${{ secrets.NEWSAPI_KEY }}"
          DISCORD_WEBHOOK_URL:  "${{ secrets.DISCORD_WEBHOOK_URL }}"
          RISK_PROFILE:         "${{ vars.RISK_PROFILE }}"
          INVESTMENT_HORIZON:   "${{ vars.INVESTMENT_HORIZON }}"
          TICKER_UNIVERSE:      "${{ vars.TICKER_UNIVERSE }}"
          SWING_TICKERS:        "${{ vars.SWING_TICKERS }}"
          STARTING_CAPITAL_EUR: "${{ vars.STARTING_CAPITAL_EUR }}"
          MAX_CAPITAL_DEPLOYED_EUR: "${{ vars.MAX_CAPITAL_DEPLOYED_EUR }}"
          LLM_CALLS_PER_HOUR_LIMIT: "${{ vars.LLM_CALLS_PER_HOUR_LIMIT }}"
          BROKER_ENV:           "${{ vars.BROKER_ENV }}"
          AUTO_TRADE_ENABLED:   "${{ vars.AUTO_TRADE_ENABLED }}"
          SWEEP_ENABLED:        "${{ vars.SWEEP_ENABLED }}"
          SWEEP_TICKER:         "${{ vars.SWEEP_TICKER }}"
          SWEEP_MIN_EUR:        "${{ vars.SWEEP_MIN_EUR }}"
          SWEEP_RESERVE_PCT:    "${{ vars.SWEEP_RESERVE_PCT }}"
          ADVISORY_MODE:        "${{ vars.ADVISORY_MODE }}"
          ADVISORY_MARKETS:     "${{ vars.ADVISORY_MARKETS }}"
          ADVISORY_LIVE_MARKETS: "${{ vars.ADVISORY_LIVE_MARKETS }}"
          ADVISORY_SHADOW_MARKETS: "${{ vars.ADVISORY_SHADOW_MARKETS }}"
          ADVISORY_SHADOW_DISCORD_MARKETS: "${{ vars.ADVISORY_SHADOW_DISCORD_MARKETS }}"
          ADVISORY_CAPITAL_EUR: "${{ vars.ADVISORY_CAPITAL_EUR }}"
          ADVISORY_MAX_LIVE_ALERTS_PER_DAY: "${{ vars.ADVISORY_MAX_LIVE_ALERTS_PER_DAY }}"
          ADVISORY_MAX_SHADOW_SIGNALS_PER_DAY: "${{ vars.ADVISORY_MAX_SHADOW_SIGNALS_PER_DAY }}"
          ADVISORY_MAX_SHADOW_DISCORD_ALERTS_PER_DAY: "${{ vars.ADVISORY_MAX_SHADOW_DISCORD_ALERTS_PER_DAY }}"
          ADVISORY_MAX_OPEN_LIVE_TRADES: "${{ vars.ADVISORY_MAX_OPEN_LIVE_TRADES }}"
          ADVISORY_MAX_LIVE_TRADES_PER_SESSION: "${{ vars.ADVISORY_MAX_LIVE_TRADES_PER_SESSION }}"
          ADVISORY_RISK_PER_TRADE_EUR: "${{ vars.ADVISORY_RISK_PER_TRADE_EUR }}"
          ADVISORY_MAX_DAILY_LOSS_EUR: "${{ vars.ADVISORY_MAX_DAILY_LOSS_EUR }}"
          ADVISORY_DEFAULT_SIZE_EUR: "${{ vars.ADVISORY_DEFAULT_SIZE_EUR }}"
          ADVISORY_A_PLUS_MAX_SIZE_EUR: "${{ vars.ADVISORY_A_PLUS_MAX_SIZE_EUR }}"
          ADVISORY_MIN_COMPOSITE: "${{ vars.ADVISORY_MIN_COMPOSITE }}"
          ADVISORY_MIN_WATCH_COMPOSITE: "${{ vars.ADVISORY_MIN_WATCH_COMPOSITE }}"
          ADVISORY_MIN_WATCH_BREAKOUT_QUALITY: "${{ vars.ADVISORY_MIN_WATCH_BREAKOUT_QUALITY }}"
          ADVISORY_WATCH_REPEAT_MIN_COMPOSITE_DELTA: "${{ vars.ADVISORY_WATCH_REPEAT_MIN_COMPOSITE_DELTA }}"
          ADVISORY_WATCH_REPEAT_MIN_BREAKOUT_DELTA: "${{ vars.ADVISORY_WATCH_REPEAT_MIN_BREAKOUT_DELTA }}"
          ADVISORY_IGNITION_MIN_COMPOSITE: "${{ vars.ADVISORY_IGNITION_MIN_COMPOSITE }}"
          ADVISORY_IGNITION_MIN_VOLUME_RATIO: "${{ vars.ADVISORY_IGNITION_MIN_VOLUME_RATIO }}"
          ADVISORY_IGNITION_MIN_ATR_MOVE: "${{ vars.ADVISORY_IGNITION_MIN_ATR_MOVE }}"
          ADVISORY_IGNITION_DEBUG: "${{ vars.ADVISORY_IGNITION_DEBUG }}"
          ADVISORY_MAX_WATCH_ALERTS_PER_SYMBOL_PER_SESSION: "${{ vars.ADVISORY_MAX_WATCH_ALERTS_PER_SYMBOL_PER_SESSION }}"
          ADVISORY_MAX_WATCH_ALERTS_PER_SESSION: "${{ vars.ADVISORY_MAX_WATCH_ALERTS_PER_SESSION }}"
          ADVISORY_MIN_EV_PCT: "${{ vars.ADVISORY_MIN_EV_PCT }}"
          ADVISORY_MIN_BREAKOUT_QUALITY: "${{ vars.ADVISORY_MIN_BREAKOUT_QUALITY }}"
          ADVISORY_DISCORD_MIN_GRADE: "${{ vars.ADVISORY_DISCORD_MIN_GRADE }}"
          ADVISORY_SHADOW_DISCORD_MIN_GRADE: "${{ vars.ADVISORY_SHADOW_DISCORD_MIN_GRADE }}"
          ADVISORY_US_MIN_MINUTES_AFTER_OPEN: "${{ vars.ADVISORY_US_MIN_MINUTES_AFTER_OPEN }}"
          ADVISORY_US_EARLY_MIN_ROWS: "${{ vars.ADVISORY_US_EARLY_MIN_ROWS }}"
          ADVISORY_TR_MORNING_START_MINUTES: "${{ vars.ADVISORY_TR_MORNING_START_MINUTES }}"
          ADVISORY_LATE_CHASE_ATR_MULT: "${{ vars.ADVISORY_LATE_CHASE_ATR_MULT }}"
          ADVISORY_ALLOW_SHORT: "${{ vars.ADVISORY_ALLOW_SHORT }}"
          ADVISORY_AUTO_RUN:    "${{ vars.ADVISORY_AUTO_RUN }}"
          ADVISORY_AUTO_ALPACA_API_KEY:    "${{ secrets.ADVISORY_AUTO_ALPACA_API_KEY }}"
          ADVISORY_AUTO_ALPACA_SECRET_KEY: "${{ secrets.ADVISORY_AUTO_ALPACA_SECRET_KEY }}"
          ADVISORY_AUTO_DRY_RUN:           "${{ vars.ADVISORY_AUTO_DRY_RUN }}"
          ADVISORY_AUTO_PAPER_EXECUTION:   "${{ vars.ADVISORY_AUTO_PAPER_EXECUTION }}"
          ADVISORY_AUTO_CAPITAL_EUR:       "${{ vars.ADVISORY_AUTO_CAPITAL_EUR }}"
          ADVISORY_AUTO_MAX_POSITIONS:     "${{ vars.ADVISORY_AUTO_MAX_POSITIONS }}"
          ADVISORY_AUTO_DAILY_LOSS_EUR:    "${{ vars.ADVISORY_AUTO_DAILY_LOSS_EUR }}"
          ADVISORY_AUTO_ALLOC_A_PLUS:      "${{ vars.ADVISORY_AUTO_ALLOC_A_PLUS }}"
          ADVISORY_AUTO_ALLOC_A:           "${{ vars.ADVISORY_AUTO_ALLOC_A }}"
          ADVISORY_AUTO_ALLOC_B:           "${{ vars.ADVISORY_AUTO_ALLOC_B }}"
          ADVISORY_AUTO_MAX_SIGNAL_AGE_MIN: "${{ vars.ADVISORY_AUTO_MAX_SIGNAL_AGE_MIN }}"
          ADVISORY_AUTO_MAX_PENDING_ORDERS: "${{ vars.ADVISORY_AUTO_MAX_PENDING_ORDERS }}"
          ADVISORY_AUTO_MAX_CHASE_PCT:     "${{ vars.ADVISORY_AUTO_MAX_CHASE_PCT }}"
          ADVISORY_REPLAY_ENABLED:         "${{ vars.ADVISORY_REPLAY_ENABLED }}"
          ADVISORY_REPLAY_LIMIT:           "${{ vars.ADVISORY_REPLAY_LIMIT }}"
          ADVISORY_REPLAY_5D_LIMIT:        "${{ vars.ADVISORY_REPLAY_5D_LIMIT }}"
          ADVISORY_LEARNER_MIN_SAMPLE:     "${{ vars.ADVISORY_LEARNER_MIN_SAMPLE }}"
          ADVISORY_LEARNER_LOOKBACK_DAYS:  "${{ vars.ADVISORY_LEARNER_LOOKBACK_DAYS }}"
          EURUSD_RATE:          "${{ vars.EURUSD_RATE }}"
          FRED_API_KEY:         "${{ secrets.FRED_API_KEY }}"
          LATE_CHASE_BLOCK_ENABLED: "${{ vars.LATE_CHASE_BLOCK_ENABLED }}"
          LATE_CHASE_ATR_MULT:  "${{ vars.LATE_CHASE_ATR_MULT }}"
          BLOCKED_OPPORTUNITY_REPLAY_ENABLED: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_ENABLED }}"
          BLOCKED_OPPORTUNITY_REPLAY_MIN_AGE_MINUTES: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_MIN_AGE_MINUTES }}"
          BLOCKED_OPPORTUNITY_REPLAY_HORIZON_MINUTES: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_HORIZON_MINUTES }}"
          BLOCKED_OPPORTUNITY_REPLAY_LIMIT: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_LIMIT }}"
          DISPATCH_MODE:        "${{ github.event.inputs.mode }}"
          EVENT_SCHEDULE:       "${{ github.event.schedule }}"
        run: |
          python <<'PY'
          import os
          from datetime import datetime, timezone
          from backend.agent import (
              run_portfolio_review,
              run_weekly_digest,
              run_nightly_sweep,
              run_post_market_analytics,
              run_daily_eod_review,
          )
          from backend.advisory import run_advisory_cycle

          def _truthy(value, default=False):
              raw = str(value if value is not None else "").strip().lower()
              if not raw:
                  return default
              return raw in {"1", "true", "yes", "on"}

          dispatch_mode = os.getenv("DISPATCH_MODE", "").strip()
          event_schedule = os.getenv("EVENT_SCHEDULE", "").strip()
          action_ran = False
          send_cycle_summary = True

          if dispatch_mode == "portfolio_review":
              print("Running weekly portfolio review (manual trigger)...")
              run_portfolio_review()
              action_ran = True
          elif dispatch_mode == "digest":
              print("Running weekly digest (manual trigger)...")
              run_weekly_digest()
              action_ran = True
          elif dispatch_mode == "sweep":
              print("Running nightly sweep (manual trigger)...")
              run_nightly_sweep()
              action_ran = True
          elif dispatch_mode == "analytics":
              print("Running post-market analytics + advisory learner (manual trigger)...")
              run_post_market_analytics()
              action_ran = True
          elif dispatch_mode == "eod_review":
              print("Running daily EOD review (manual trigger)...")
              run_daily_eod_review()
              action_ran = True
              send_cycle_summary = False
          elif dispatch_mode == "advisory":
              print("Running advisory cycle (manual trigger)...")
              run_advisory_cycle()
              action_ran = True
          elif event_schedule == "0 17 * * 0":
              print("Running weekly portfolio review (scheduled trigger)...")
              run_portfolio_review()
              action_ran = True
          elif event_schedule == "0 18 * * 0":
              print("Running weekly digest (scheduled trigger)...")
              run_weekly_digest()
              action_ran = True
          elif event_schedule == "5 21 * * 1-5":
              print("Running nightly sweep (scheduled trigger)...")
              run_nightly_sweep()
              print("Running post-market analytics + advisory learner...")
              run_post_market_analytics()
              action_ran = True
          elif event_schedule == "25 21 * * 1-5":
              print("Running daily EOD review (scheduled trigger)...")
              run_daily_eod_review()
              action_ran = True
              send_cycle_summary = False
          else:
              # Off-hours advisory scan (triggered by '0 */4 * * 1-5' cron or
              # manual dispatch without a mode).
              now = datetime.now(timezone.utc)
              if now.weekday() == 6 and now.hour == 17:
                  print("Running weekly portfolio review...")
                  run_portfolio_review()
                  action_ran = True
              elif now.weekday() == 6 and now.hour == 18:
                  print("Running weekly digest...")
                  run_weekly_digest()
                  action_ran = True
              elif now.weekday() < 5 and now.hour == 21 and now.minute < 10:
                  print("Running nightly sweep...")
                  run_nightly_sweep()
                  print("Running post-market analytics + advisory learner...")
                  run_post_market_analytics()
                  action_ran = True
              elif now.weekday() < 5 and now.hour == 21 and 20 <= now.minute < 35:
                  print("Running daily EOD review...")
                  run_daily_eod_review()
                  action_ran = True
                  send_cycle_summary = False
              else:
                  advisory_enabled = _truthy(os.getenv("ADVISORY_MODE"), False)
                  if advisory_enabled:
                      print("Running off-hours advisory scan...")
                      run_advisory_cycle()
                      action_ran = True
                  else:
                      print("Advisory mode not enabled — no action.")

          with open(os.environ["GITHUB_ENV"], "a") as fh:
              fh.write(f"AGENT_ACTION_RAN={'true' if action_ran else 'false'}\n")
              fh.write(f"SEND_CYCLE_SUMMARY={'true' if send_cycle_summary else 'false'}\n")
          PY

      - name: Send Discord summary
        if: always() && env.AGENT_ACTION_RAN == 'true' && env.SEND_CYCLE_SUMMARY == 'true'
        env:
          PYTHONPATH: "."
          DISCORD_WEBHOOK_URL:  "${{ secrets.DISCORD_WEBHOOK_URL }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          ALPACA_BASE_URL:      https://paper-api.alpaca.markets
          STARTING_CAPITAL_EUR: "${{ vars.STARTING_CAPITAL_EUR }}"
          MAX_CAPITAL_DEPLOYED_EUR: "${{ vars.MAX_CAPITAL_DEPLOYED_EUR }}"
          EURUSD_RATE:          "${{ vars.EURUSD_RATE }}"
          DISCORD_SUMMARY_INTERVAL_MINUTES: "${{ vars.DISCORD_SUMMARY_INTERVAL_MINUTES }}"
        run: |
          python scripts/discord_notify.py

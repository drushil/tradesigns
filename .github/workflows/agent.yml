name: Trading Agent - Signal Cycle

on:
  schedule:
    # Weekly portfolio review: Sunday 17:00 UTC (observation only, no trades)
    - cron: '0 17 * * 0'
    # Weekly digest: Sunday 18:00 UTC
    - cron: '0 18 * * 0'
    # Off-hours macro/advisory alert scan (weekdays only; no weekend noise)
    - cron: '0 */4 * * 1-5'
    # Nightly sweep — after US market close Mon-Fri (21:05 UTC)
    - cron: '5 21 * * 1-5'
    # Daily EOD review — after replay analytics (read-only recommendations)
    - cron: '25 21 * * 1-5'
    # Daily swing position re-evaluation — 09:35 New York, DST-aware in Python
    - cron: '35 13,14 * * 1-5'
    # Manual advisory scan windows — EU open and US high-probability windows
    - cron: '*/15 7-9 * * 1-5'
    # Full US market hours (14:00–20:00 UTC). Previously 13-15,18-19 left a
    # 16:00–17:59 UTC gap (noon–2pm ET) that was only covered by cron-job.org.
    # Extended to 13-19 so GitHub Actions covers the full session.
    # cron-job.org should be set to ≥12 min interval to avoid cancel-in-progress collisions.
    - cron: '*/10 13-19 * * 1-5'
  # Market-hours cycles triggered by cron-job.org via workflow_dispatch
  # (more reliable than GitHub's schedule — honours triggers within seconds)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Override agent mode (leave blank for auto-detect by time)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: trading-agent-cycle
  cancel-in-progress: true

jobs:
  run-agent-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Validate runtime configuration
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
        run: |
          python <<'PY'
          import os
          import sys

          required = [
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "GROQ_API_KEY",
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_KEY",
          ]
          missing = [key for key in required if not os.getenv(key)]
          for key in required:
              print(f"{key}: {'set' if os.getenv(key) else 'missing'}")
          if missing:
              print(f"Missing required configuration: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run signal cycle
        env:
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          ALPACA_BASE_URL:      https://paper-api.alpaca.markets
          GROQ_API_KEY:         "${{ secrets.GROQ_API_KEY }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          NEWSAPI_KEY:          "${{ secrets.NEWSAPI_KEY }}"
          DISCORD_WEBHOOK_URL:  "${{ secrets.DISCORD_WEBHOOK_URL }}"
          RISK_PROFILE:         "${{ vars.RISK_PROFILE }}"
          INVESTMENT_HORIZON:   "${{ vars.INVESTMENT_HORIZON }}"
          TICKER_UNIVERSE:      "${{ vars.TICKER_UNIVERSE }}"
          SWING_TICKERS:        "${{ vars.SWING_TICKERS }}"
          STARTING_CAPITAL_EUR: "${{ vars.STARTING_CAPITAL_EUR }}"
          MAX_CAPITAL_DEPLOYED_EUR: "${{ vars.MAX_CAPITAL_DEPLOYED_EUR }}"
          LLM_CALLS_PER_HOUR_LIMIT: "${{ vars.LLM_CALLS_PER_HOUR_LIMIT }}"
          BROKER_ENV:           "${{ vars.BROKER_ENV }}"
          SWEEP_TICKER:         "${{ vars.SWEEP_TICKER }}"
          SWEEP_ENABLED:        "${{ vars.SWEEP_ENABLED }}"
          SWEEP_MIN_EUR:        "${{ vars.SWEEP_MIN_EUR }}"
          SWEEP_RESERVE_PCT:    "${{ vars.SWEEP_RESERVE_PCT }}"
          DIVIDEND_SCAN_ENABLED: "${{ vars.DIVIDEND_SCAN_ENABLED }}"
          DIVIDEND_MIN_YIELD_PCT: "${{ vars.DIVIDEND_MIN_YIELD_PCT }}"
          ALLOW_SHORT_SELLING:  "${{ vars.ALLOW_SHORT_SELLING }}"
          ALLOW_B_GRADE_EXPLORATION: "${{ vars.ALLOW_B_GRADE_EXPLORATION }}"
          TREND_SCORE_THRESHOLD: "${{ vars.TREND_SCORE_THRESHOLD }}"
          EV_ALLOW_EXPLORATION: "${{ vars.EV_ALLOW_EXPLORATION }}"
          EV_MIN_NET_PCT:       "${{ vars.EV_MIN_NET_PCT }}"
          GRADE_EV_OVERRIDE_NEGATIVE_MIN_SAMPLES: "${{ vars.GRADE_EV_OVERRIDE_NEGATIVE_MIN_SAMPLES }}"
          PROBE_FLOOR_INFLATION_MAX_MULTIPLE: "${{ vars.PROBE_FLOOR_INFLATION_MAX_MULTIPLE }}"
          MAX_NEW_INTRADAY_TRADES_PER_CYCLE: "${{ vars.MAX_NEW_INTRADAY_TRADES_PER_CYCLE }}"
          TICKER_DAILY_LOSS_COOLDOWN_COUNT: "${{ vars.TICKER_DAILY_LOSS_COOLDOWN_COUNT }}"
          TICKER_LOSS_REENTRY_MIN_SCORE: "${{ vars.TICKER_LOSS_REENTRY_MIN_SCORE }}"
          THESIS_INVALIDATED_COOLDOWN_MINUTES: "${{ vars.THESIS_INVALIDATED_COOLDOWN_MINUTES }}"
          HIGH_ATR_STOP_THRESHOLD_PCT: "${{ vars.HIGH_ATR_STOP_THRESHOLD_PCT }}"
          HIGH_ATR_STOP_MULTIPLIER: "${{ vars.HIGH_ATR_STOP_MULTIPLIER }}"
          RANGING_MAX_TRADES_PER_DAY: "${{ vars.RANGING_MAX_TRADES_PER_DAY }}"
          RANGING_REGIME_SIZE_MULTIPLIER: "${{ vars.RANGING_REGIME_SIZE_MULTIPLIER }}"
          RANGING_A_PLUS_MIN_COMPOSITE: "${{ vars.RANGING_A_PLUS_MIN_COMPOSITE }}"
          RANGING_A_PLUS_MIN_BREAKOUT_QUALITY: "${{ vars.RANGING_A_PLUS_MIN_BREAKOUT_QUALITY }}"
          RANGING_A_PLUS_MIN_EV_PCT: "${{ vars.RANGING_A_PLUS_MIN_EV_PCT }}"
          RANGING_A_GRADE_MIN_BREAKOUT_QUALITY: "${{ vars.RANGING_A_GRADE_MIN_BREAKOUT_QUALITY }}"
          RANGING_A_GRADE_MIN_EV_PCT: "${{ vars.RANGING_A_GRADE_MIN_EV_PCT }}"
          RANGING_PROBE_ENABLED: "${{ vars.RANGING_PROBE_ENABLED }}"
          RANGING_PROBE_ALLOWED_GRADES: "${{ vars.RANGING_PROBE_ALLOWED_GRADES }}"
          RANGING_PROBE_SHADOW_GRADES: "${{ vars.RANGING_PROBE_SHADOW_GRADES }}"
          RANGING_PROBE_SIZE_MULTIPLIER: "${{ vars.RANGING_PROBE_SIZE_MULTIPLIER }}"
          RANGING_PROBE_GRADE_B_SHADOW_SIZE_MULTIPLIER: "${{ vars.RANGING_PROBE_GRADE_B_SHADOW_SIZE_MULTIPLIER }}"
          RANGING_PROBE_GRADE_B_MIN_COMPOSITE: "${{ vars.RANGING_PROBE_GRADE_B_MIN_COMPOSITE }}"
          RANGING_PROBE_GRADE_B_MIN_BREAKOUT_QUALITY: "${{ vars.RANGING_PROBE_GRADE_B_MIN_BREAKOUT_QUALITY }}"
          RANGING_PROBE_GRADE_B_PROMOTE_MIN_SAMPLES: "${{ vars.RANGING_PROBE_GRADE_B_PROMOTE_MIN_SAMPLES }}"
          RANGING_PROBE_GRADE_B_PROMOTE_MIN_WIN_RATE: "${{ vars.RANGING_PROBE_GRADE_B_PROMOTE_MIN_WIN_RATE }}"
          RANGING_PROBE_GRADE_B_PROMOTE_REQUIRES_MFE_GT_MAE: "${{ vars.RANGING_PROBE_GRADE_B_PROMOTE_REQUIRES_MFE_GT_MAE }}"
          RANGING_PROBE_GRADE_B_PROMOTE_SIZE_MULTIPLIER: "${{ vars.RANGING_PROBE_GRADE_B_PROMOTE_SIZE_MULTIPLIER }}"
          RANGING_PROBE_MIN_EV_PCT: "${{ vars.RANGING_PROBE_MIN_EV_PCT }}"
          RANGING_PROBE_MIN_COMPOSITE: "${{ vars.RANGING_PROBE_MIN_COMPOSITE }}"
          RANGING_PROBE_MIN_BREAKOUT_QUALITY: "${{ vars.RANGING_PROBE_MIN_BREAKOUT_QUALITY }}"
          RANGING_PROBE_MIN_ALIGNED_SIGNALS: "${{ vars.RANGING_PROBE_MIN_ALIGNED_SIGNALS }}"
          RANGING_PROBE_MIN_MACD: "${{ vars.RANGING_PROBE_MIN_MACD }}"
          RANGING_PROBE_MIN_TAPE: "${{ vars.RANGING_PROBE_MIN_TAPE }}"
          RANGING_PROBE_MIN_RELATIVE_STRENGTH: "${{ vars.RANGING_PROBE_MIN_RELATIVE_STRENGTH }}"
          RANGING_PROBE_MAX_TAPE_AGAINST: "${{ vars.RANGING_PROBE_MAX_TAPE_AGAINST }}"
          RANGING_PROBE_MIN_SECTOR_RELATIVE_PCT: "${{ vars.RANGING_PROBE_MIN_SECTOR_RELATIVE_PCT }}"
          RANGING_PROBE_BLOCKED_THEMES: "${{ vars.RANGING_PROBE_BLOCKED_THEMES }}"
          RANGING_MAX_NOTIONAL_EUR: "${{ vars.RANGING_MAX_NOTIONAL_EUR }}"
          RANGING_STOP_LOSS_COOLDOWN_MINUTES: "${{ vars.RANGING_STOP_LOSS_COOLDOWN_MINUTES }}"
          MIN_REWARD_RISK_RATIO: "${{ vars.MIN_REWARD_RISK_RATIO }}"
          RANGING_MIN_REWARD_RISK_RATIO: "${{ vars.RANGING_MIN_REWARD_RISK_RATIO }}"
          SIGNAL_CONSENSUS_MIN_COUNT: "${{ vars.SIGNAL_CONSENSUS_MIN_COUNT }}"
          RANGING_SIGNAL_CONSENSUS_MIN_COUNT: "${{ vars.RANGING_SIGNAL_CONSENSUS_MIN_COUNT }}"
          RANGING_CORE_CONSENSUS_ENABLED: "${{ vars.RANGING_CORE_CONSENSUS_ENABLED }}"
          RANGING_CORE_CONSENSUS_MIN_COUNT: "${{ vars.RANGING_CORE_CONSENSUS_MIN_COUNT }}"
          SIGNAL_CONSENSUS_MIN_STRENGTH: "${{ vars.SIGNAL_CONSENSUS_MIN_STRENGTH }}"
          MAX_OPEN_POSITIONS_PER_THEME: "${{ vars.MAX_OPEN_POSITIONS_PER_THEME }}"
          SECTOR_MOMENTUM_BONUS_ENABLED: "${{ vars.SECTOR_MOMENTUM_BONUS_ENABLED }}"
          SECTOR_MOMENTUM_LEADERSHIP_THRESHOLD_PCT: "${{ vars.SECTOR_MOMENTUM_LEADERSHIP_THRESHOLD_PCT }}"
          SECTOR_MOMENTUM_MAX_BONUS: "${{ vars.SECTOR_MOMENTUM_MAX_BONUS }}"
          THEME_MAX_CANDIDATES_PER_CYCLE: "${{ vars.THEME_MAX_CANDIDATES_PER_CYCLE }}"
          THEME_MAX_LEVERAGED_CANDIDATES_PER_CYCLE: "${{ vars.THEME_MAX_LEVERAGED_CANDIDATES_PER_CYCLE }}"
          DYNAMIC_UNIVERSE_SHADOW_ENABLED: "${{ vars.DYNAMIC_UNIVERSE_SHADOW_ENABLED }}"
          DYNAMIC_UNIVERSE_MAX_SHADOW_PER_THEME: "${{ vars.DYNAMIC_UNIVERSE_MAX_SHADOW_PER_THEME }}"
          BLOCKED_OPPORTUNITY_REPLAY_ENABLED: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_ENABLED }}"
          BLOCKED_OPPORTUNITY_REPLAY_MIN_AGE_MINUTES: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_MIN_AGE_MINUTES }}"
          BLOCKED_OPPORTUNITY_REPLAY_HORIZON_MINUTES: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_HORIZON_MINUTES }}"
          BLOCKED_OPPORTUNITY_REPLAY_LIMIT: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_LIMIT }}"
          BLOCKED_OPPORTUNITY_REPLAY_NEWEST_FIRST: "${{ vars.BLOCKED_OPPORTUNITY_REPLAY_NEWEST_FIRST }}"
          ADVISORY_MODE:        "${{ vars.ADVISORY_MODE }}"
          ADVISORY_MARKETS:     "${{ vars.ADVISORY_MARKETS }}"
          ADVISORY_LIVE_MARKETS: "${{ vars.ADVISORY_LIVE_MARKETS }}"
          ADVISORY_SHADOW_MARKETS: "${{ vars.ADVISORY_SHADOW_MARKETS }}"
          ADVISORY_SHADOW_DISCORD_MARKETS: "${{ vars.ADVISORY_SHADOW_DISCORD_MARKETS }}"
          ADVISORY_CAPITAL_EUR: "${{ vars.ADVISORY_CAPITAL_EUR }}"
          ADVISORY_MAX_LIVE_ALERTS_PER_DAY: "${{ vars.ADVISORY_MAX_LIVE_ALERTS_PER_DAY }}"
          ADVISORY_MAX_SHADOW_SIGNALS_PER_DAY: "${{ vars.ADVISORY_MAX_SHADOW_SIGNALS_PER_DAY }}"
          ADVISORY_MAX_SHADOW_DISCORD_ALERTS_PER_DAY: "${{ vars.ADVISORY_MAX_SHADOW_DISCORD_ALERTS_PER_DAY }}"
          ADVISORY_MAX_OPEN_LIVE_TRADES: "${{ vars.ADVISORY_MAX_OPEN_LIVE_TRADES }}"
          ADVISORY_MAX_LIVE_TRADES_PER_SESSION: "${{ vars.ADVISORY_MAX_LIVE_TRADES_PER_SESSION }}"
          ADVISORY_RISK_PER_TRADE_EUR: "${{ vars.ADVISORY_RISK_PER_TRADE_EUR }}"
          ADVISORY_MAX_DAILY_LOSS_EUR: "${{ vars.ADVISORY_MAX_DAILY_LOSS_EUR }}"
          ADVISORY_DEFAULT_SIZE_EUR: "${{ vars.ADVISORY_DEFAULT_SIZE_EUR }}"
          ADVISORY_A_PLUS_MAX_SIZE_EUR: "${{ vars.ADVISORY_A_PLUS_MAX_SIZE_EUR }}"
          ADVISORY_MIN_COMPOSITE: "${{ vars.ADVISORY_MIN_COMPOSITE }}"
          ADVISORY_MIN_EV_PCT: "${{ vars.ADVISORY_MIN_EV_PCT }}"
          ADVISORY_MIN_BREAKOUT_QUALITY: "${{ vars.ADVISORY_MIN_BREAKOUT_QUALITY }}"
          ADVISORY_DISCORD_MIN_GRADE: "${{ vars.ADVISORY_DISCORD_MIN_GRADE }}"
          ADVISORY_SHADOW_DISCORD_MIN_GRADE: "${{ vars.ADVISORY_SHADOW_DISCORD_MIN_GRADE }}"
          ADVISORY_US_MIN_MINUTES_AFTER_OPEN: "${{ vars.ADVISORY_US_MIN_MINUTES_AFTER_OPEN }}"
          ADVISORY_ALLOW_SHORT: "${{ vars.ADVISORY_ALLOW_SHORT }}"
          ADVISORY_AUTO_RUN:    "${{ vars.ADVISORY_AUTO_RUN }}"
          EURUSD_RATE:          "${{ vars.EURUSD_RATE }}"
          FRED_API_KEY:         "${{ secrets.FRED_API_KEY }}"
          DISPATCH_MODE:        "${{ github.event.inputs.mode }}"
        run: |
          python <<'PY'
          import os
          from datetime import datetime, timezone
          from backend.agent import (
              is_regular_us_market_hours,
              run_signal_cycle,
              run_portfolio_review,
              run_weekly_digest,
              run_nightly_sweep,
              run_post_market_analytics,
              run_daily_eod_review,
              re_evaluate_swing_positions,
              _should_run_swing_recheck,
          )
          from backend.advisory import run_advisory_cycle

          def _truthy(value, default=False):
              raw = str(value if value is not None else "").strip().lower()
              if not raw:
                  return default
              return raw in {"1", "true", "yes", "on"}

          # Manual override via workflow_dispatch input takes priority
          dispatch_mode = os.getenv("DISPATCH_MODE", "").strip()
          action_ran = False
          send_cycle_summary = True
          if dispatch_mode == "portfolio_review":
              print("Running weekly portfolio review (manual trigger)...")
              run_portfolio_review()
              action_ran = True
          elif dispatch_mode == "digest":
              print("Running weekly digest (manual trigger)...")
              run_weekly_digest()
              action_ran = True
          elif dispatch_mode == "sweep":
              print("Running nightly sweep (manual trigger)...")
              run_nightly_sweep()
              action_ran = True
          elif dispatch_mode == "analytics":
              print("Running post-market analytics (manual trigger)...")
              run_post_market_analytics()
              action_ran = True
          elif dispatch_mode == "eod_review":
              print("Running daily EOD review (manual trigger)...")
              run_daily_eod_review()
              action_ran = True
              send_cycle_summary = False
          elif dispatch_mode == "signal":
              print("Running signal cycle (manual trigger)...")
              run_signal_cycle()
              action_ran = True
          elif dispatch_mode == "advisory":
              print("Running advisory cycle (manual trigger)...")
              run_advisory_cycle()
              action_ran = True
          else:
              now = datetime.now(timezone.utc)
              if now.weekday() == 6 and now.hour == 17:
                  print("Running weekly portfolio review...")
                  run_portfolio_review()
                  action_ran = True
              elif now.weekday() == 6 and now.hour == 18:
                  print("Running weekly digest...")
                  run_weekly_digest()
                  action_ran = True
              elif now.weekday() < 5 and now.hour == 21 and now.minute < 10:
                  print("Running nightly sweep...")
                  run_nightly_sweep()
                  print("Running post-market analytics...")
                  run_post_market_analytics()
                  action_ran = True
              elif now.weekday() < 5 and now.hour == 21 and 20 <= now.minute < 35:
                  print("Running daily EOD review...")
                  run_daily_eod_review()
                  action_ran = True
                  send_cycle_summary = False
              elif _should_run_swing_recheck(now):
                  print("Running daily swing re-evaluation...")
                  re_evaluate_swing_positions()
                  action_ran = True
              else:
                  advisory_result = None
                  advisory_enabled = _truthy(os.getenv("ADVISORY_MODE"), False)
                  advisory_auto = _truthy(os.getenv("ADVISORY_AUTO_RUN"), True)
                  advisory_window = now.weekday() < 5 and (7 <= now.hour <= 9 or 13 <= now.hour <= 15 or 18 <= now.hour <= 19)
                  if advisory_enabled and advisory_auto and advisory_window:
                      print("Running advisory scan...")
                      advisory_result = run_advisory_cycle()
                      print(f"Advisory result: {advisory_result}")
                      action_ran = True
                  if is_regular_us_market_hours(now):
                      print("Running signal cycle...")
                      run_signal_cycle()
                      action_ran = True
                  elif advisory_result is None:
                      print("Outside trading window — no action.")
          with open(os.environ["GITHUB_ENV"], "a") as fh:
              fh.write(f"AGENT_ACTION_RAN={'true' if action_ran else 'false'}\n")
              fh.write(f"SEND_CYCLE_SUMMARY={'true' if send_cycle_summary else 'false'}\n")
          PY

      - name: Send Discord summary
        if: always() && env.AGENT_ACTION_RAN == 'true' && env.SEND_CYCLE_SUMMARY == 'true'
        env:
          PYTHONPATH: "."
          DISCORD_WEBHOOK_URL:  "${{ secrets.DISCORD_WEBHOOK_URL }}"
          SUPABASE_URL:         "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY:    "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          ALPACA_API_KEY:       "${{ secrets.ALPACA_API_KEY }}"
          ALPACA_SECRET_KEY:    "${{ secrets.ALPACA_SECRET_KEY }}"
          ALPACA_BASE_URL:      https://paper-api.alpaca.markets
          STARTING_CAPITAL_EUR: "${{ vars.STARTING_CAPITAL_EUR }}"
          MAX_CAPITAL_DEPLOYED_EUR: "${{ vars.MAX_CAPITAL_DEPLOYED_EUR }}"
          EURUSD_RATE:          "${{ vars.EURUSD_RATE }}"
          DISCORD_SUMMARY_INTERVAL_MINUTES: "${{ vars.DISCORD_SUMMARY_INTERVAL_MINUTES }}"
        run: |
          python scripts/discord_notify.py
